strategy:
  base_cushion: 0.05
  alpha: 0.7
  max_buy_prices:
    default: 0.95
    high_confidence: 0.98
    low_volatility: 0.92
    fast_market: 0.9
  order_sizes:
    default: 100
    min: 10
    max: 1000
  risk_management:
    max_position_size: 5000
    max_total_exposure: 20000
    max_daily_loss: 500
    max_drawdown: 0.15
    min_balance: 100
  stop_loss_take_profit:
    enabled: true
    stop_loss_percentage: 0.1
    take_profit_percentage: 0.2
  market_discovery:
    gamma_api_url: ${GAMMA_API_URL:https://gamma-api.polymarket.com}
    clob_api_url: ${CLOB_API_URL:https://clob.polymarket.com}
    cache_ttl: 300
    slug_prefix: "btc-updown-5m"
    refresh_interval: 60
    enabled: true
redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  db: ${REDIS_DB:0}
  pool:
    max_connections: 50
    min_idle_connections: 5
    connection_timeout: 5
    socket_timeout: 5
  retry:
    max_attempts: 3
    retry_delay: 1
    exponential_backoff: true
modules:
  market_data_collector:
    enabled: true
    websocket:
      url: wss://ws-subscriptions-clob.polymarket.com/ws/market
      reconnect_delay: 5
      max_reconnect_attempts: 10
      ping_interval: 10
      pong_timeout: 10
    collection:
      markets_update_interval: 60
      orderbook_depth: 20
      price_history_interval: 300
  strategy_engine:
    enabled: true
    execution:
      signal_check_interval: 10
      max_concurrent_orders: 5
      order_timeout: 30
    active_strategies:
    - base_cushion
    - trend_following
    signal_filter:
      min_confidence: 0.6
      min_volume: 100
  order_executor:
    enabled: true
    clob:
      host: https://clob.polymarket.com
      chain_id: 137
      api_timeout: 30
    order_management:
      default_order_type: GTC
      max_order_age: 3600
      cancel_on_error: true
    gas:
      max_gas_price: 100
      gas_limit_multiplier: 1.2
  settlement_worker:
    enabled: true
    settlement:
      check_interval: 60
      batch_size: 50
    position:
      track_history: true
      max_history_days: 30
api:
  polymarket:
    api_key: ${POLYMARKET_API_KEY}
    api_secret: ${POLYMARKET_API_SECRET}
    api_passphrase: ${POLYMARKET_API_PASSPHRASE}
  polygon:
    rpc_url: ${POLYGON_RPC_URL:https://polygon-rpc.com}
  gamma:
    base_url: https://gamma-api.polymarket.com
    timeout: 30
notifications:
  email:
    enabled: false
    smtp_server: ${SMTP_SERVER:smtp.gmail.com}
    smtp_port: ${SMTP_PORT:587}
    smtp_username: ${SMTP_USERNAME}
    smtp_password: ${SMTP_PASSWORD}
    alert_email: ${ALERT_EMAIL}
  webhook:
    enabled: false
    url: ${WEBHOOK_URL}
  triggers:
    on_order_filled: true
    on_position_closed: true
    on_error: true
    on_large_loss: true
    large_loss_threshold: 100
system:
  environment: development
  log_level: INFO
  monitoring:
    enabled: true
    metrics_port: 9090
    health_check_port: 8080
  persistence:
    data_dir: ./data
    backup_enabled: true
    backup_interval: 86400
new_key: new_value
